name: Python Release (reusable)

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version"
        default: "3.12"
        type: string
      run_tests:
        description: "Install test extras and run pytest before building"
        default: true
        type: boolean
      test_extras:
        description: "pip extras group to install for tests (e.g. 'test' → pip install -e '.[test]')"
        default: "test"
        type: string
      rtd_slug:
        description: "ReadTheDocs project slug; leave empty to skip RTD trigger"
        default: ""
        type: string
    secrets:
      RTD_SECRET:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install package and test dependencies
        if: inputs.run_tests
        run: pip install -e ".[${{ inputs.test_extras }}]"

      - name: Install package
        if: inputs.run_tests == false
        run: pip install -e .

      - name: Run tests
        if: inputs.run_tests
        run: python -m pytest tests/

      - name: Install Hatch
        run: python -m pip install --upgrade hatch

      - name: Verify tag matches pyproject version and CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          echo "Tag version:     $TAG"
          echo "Project version: $VER"
          test "$TAG" = "$VER" || { echo "ERROR: tag $TAG != pyproject version $VER"; exit 1; }
          grep -q "^## \[$VER\]" CHANGELOG.md || { echo "ERROR: no CHANGELOG entry for $VER"; exit 1; }
          if [ -f CITATION.cff ]; then
            CFF_VER="$(grep '^version:' CITATION.cff | sed 's/version: *"\(.*\)"/\1/')"
            echo "CITATION.cff version: $CFF_VER"
            test "$TAG" = "$CFF_VER" || { echo "ERROR: tag $TAG != CITATION.cff version $CFF_VER"; exit 1; }
          fi

      - name: Clean previous builds
        run: rm -rf dist/

      - name: Build the package with Hatch
        run: hatch build

      - name: Extract release notes from CHANGELOG.md
        run: |
          echo 'RELEASE_BODY<<EOF' >> $GITHUB_ENV
          awk '
            BEGIN {found=0; capture=0}
            /^## \[Unreleased\]/ {next}
            /^## \[UNRELEASED\]/ {next}
            /^## \[/ {
              if (found) exit;
              found = 1;
              capture = 1;
              next
            }
            /^## / {capture=0}
            capture {print}
          ' CHANGELOG.md >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            dist/*.tar.gz
            dist/*.whl

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Trigger ReadTheDocs build
        if: inputs.rtd_slug != ''
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_SECRET }}" \
            https://readthedocs.org/api/v3/projects/${{ inputs.rtd_slug }}/versions/latest/builds/
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_SECRET }}" \
            https://readthedocs.org/api/v3/projects/${{ inputs.rtd_slug }}/versions/${{ github.ref_name }}/builds/
